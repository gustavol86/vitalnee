<main class="container">
   <section class="contenedor-principal">
      <div class="container py-5">
         <div class="row text-center mb-4">
            <h2 class="titulo">Aranceles</h2>
            <img src="img/barratitulo.jpg" class="img-fluid">
         </div>         
         <div class="row g-4">            
            <div class="card shadow login-card">
                <h3 class="text-center mb-4">Iniciar Sesión</h3>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" class="form-control" placeholder="Tu correo">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" placeholder="Tu contraseña">
                    </div>

                    <button class="btn btn-primary w-100 mt-2">Ingresar</button>
                </form>

                <p class="text-center mt-3">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </p>
            </div>
         </div>
      </div>
   </section>
</main>
