<main class="container">
   <section class="contenedor-principal">
      <div class="container py-5">
         <div class="row text-center mb-4">
            <h2 class="titulo">Login</h2>
            <img src="img/barratitulo.jpg" class="img-fluid">
         </div>         
         <div class="row g-4">            
            <div class="card shadow login-card">
                <form #miform="ngForm" (ngSubmit)="ingresar()">

                    <div class="mt-3">
                        <label class="form-label">Correo (admin@admin.com)</label>
                        <input type="email" class="form-control" placeholder="Tu correo" [(ngModel)]="email" name="email" required>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Contraseña (1234)</label>
                        <input type="password" class="form-control" placeholder="Tu contraseña" [(ngModel)]="password" name="password" required>
                    </div>                    
                    <button class="btn btn-primary w-100 mt-3" type="submit">Ingresar</button>

                    
                    <p *ngIf="errorMessage" class="text-danger mt-2">
                    {{ errorMessage }}
                    </p>
                </form>

                <p class="text-center mt-3">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </p>
            </div>
         </div>
      </div>
   </section>
</main>
